apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kube-system

resources:
- rbac.yaml
- init-job.yaml
- service.yaml
- sts.yaml

patches:
- path: init-job-patch.yaml

images:
- name: registry.sighup.io/fury/minio/mc
  newTag: RELEASE.2025-08-13T08-35-41Z
- name: registry.sighup.io/fury/minio
  newTag: RELEASE.2026-05-20T23-44-52Z-chainguard
- name: registry.sighup.io/fury/groundnuty/k8s-wait-for
  newTag: v2.0

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
- name: minio-credentials
  envs:
  - cloud-credentials.env
- name: cloud-credentials
  files:
  - cloud=cloud-credentials.config
