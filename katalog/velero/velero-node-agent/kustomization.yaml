apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kube-system

images:
- name: velero/velero
  newName: registry.sighup.io/fury/velero/velero
  newTag: v1.18.1

resources:
- configmap.yml
- daemonset.yml

patches:
  - target:
      kind: DaemonSet
      name: node-agent
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          ignore-check.kube-linter.io/non-existent-service-account: "ServiceAccount defined in velero-base/rbac.yaml"
